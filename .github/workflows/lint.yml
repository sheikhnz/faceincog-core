name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  ruff:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Check lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .
